# ================================================================================
# `mml` configuration file.
#
# Loaded from the first valid path among:
#   - $XDG_CONFIG_HOME/mml/config.toml
#   - $HOME/.config/mml/config.toml
#   - $HOME/.mmlrc
#
# Override with `mml -c <PATH>` or `MML_CONFIG=<PATH>`.
#
# CLI flags always win; the values below are merely defaults applied when the
# matching flag is not passed.
#
# The editor used by `compose` / `reply` / `forward` is whichever your shell
# already exports: `$VISUAL` first, then `$EDITOR`. mml does not duplicate that
# knob here — pick the editor in your shell rc file.
# ================================================================================

# Declare one section per identity. Pick one with `-a/--account <NAME>` or let
# `mml` use the entry flagged `default = true`.
[accounts.example]

# Use this account when `-a/--account` is not passed. Exactly one entry should
# set `default = true`.
default = true

# Email address used as the `From:` header.
from = "test@example.org"

# Display name placed before the address.
from-name = "Test"

# Signature delimiter prepended to the body. Defaults to the RFC 3676
# sig-dash + LF ("-- \n"); rarely worth changing.
# signature-delim = "-- \n"

# Raw signature body. The `signature-delim` (default "-- \n") is prepended
# automatically at runtime, so do NOT include the sig-dash here.
signature = """Test
https://example.org"""

# How to attach the signature.
#   inlined  — append to the body (default)
#   attached — ship as a `signature.txt` attachment
#   hidden   — omit entirely
# compose.signature-style = "inlined"

# Where to place the signature relative to the quoted thread.
#   above-quote — between your reply and the quote
#   below-quote — after the quote (default)
#   attached    — `signature.txt` attachment
#   hidden      — omit entirely
# reply.signature-style = "below-quote"

# Where to place your reply relative to the quoted thread.
#   top         — your reply, then the quote (default)
#   bottom      — the quote, then your reply
#   interleaved — cursor placed at the top of the quote
# reply.posting-style = "top"

# Line printed above the quoted thread. Empty by default.
# reply.quote-headline = "On <date>, <author> wrote:\n"

# How to attach the signature.
#   inlined | attached | hidden
# forward.signature-style = "inlined"

# How to attach the forwarded message.
#   top      — quoted inline below your body (default)
#   attached — shipped as a `message/rfc822` attachment
# forward.posting-style = "top"

# Line printed above the forwarded message.
# forward.quote-headline = "-------- Forwarded Message --------\n"

# Whitelist of header names to keep. When set, all other headers are dropped.
# read.include-headers = ["From", "To", "Cc", "Subject", "Date"]

# Blacklist of header names to drop. Ignored when `include-headers` is set.
# read.exclude-headers = ["Received", "DKIM-Signature"]

# Whitelist / blacklist of MIME part content types.
# read.include-parts = ["text/plain"]
# read.exclude-parts = ["text/html"]

# Render the `multipart/*` part markers in the output.
# read.show-multiparts = false

# Save attachments to disk while rendering.
# read.save-attachments = false
# read.save-attachments-dir = "~/Downloads"

# Suppress attachment markers in the rendered output.
# read.hide-attachments = false
# read.hide-inline-attachments = false

# Strip the trailing `-- \n` signature block from plain-text parts.
# read.hide-plain-texts-signature = false
