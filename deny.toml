[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
  "https://github.com/pimalaya/cli",
  "https://github.com/pimalaya/config",
]

[licenses]
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-3-Clause",
  "CC0-1.0",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]

[licenses.private]
ignore = true
